name: Maven CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # ✅ DEBUG STEP (TEMPORARY)
      - name: Debug Maven project structure
        run: |
          echo "Current directory:"
          pwd
          echo "Repository root:"
          ls
          echo "Contents of my-project:"
          ls my-project || true
          echo "Searching for pom.xml:"
          find . -name pom.xml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: maven
          cache-dependency-path: my-project/pom.xml

      - name: Build and test with Maven
        working-directory: my-project
        run: mvn clean verify
